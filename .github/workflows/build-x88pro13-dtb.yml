name: Build X88 Pro 13 DTB

on:
  workflow_dispatch:

jobs:
  build-dtb:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v6
        with:
          repository: xyzphp/linux-6.18.y
          ref: x88pro13-dts

      - name: Install DTC
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq device-tree-compiler gcc-aarch64-linux-gnu

      - name: Compile DTB
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- rockchip/rk3528-x88pro13.dtb
          ls -la arch/arm64/boot/dts/rockchip/rk3528-x88pro13.dtb

      - name: Upload DTB
        uses: actions/upload-artifact@v4
        with:
          name: rk3528-x88pro13-dtb
          path: arch/arm64/boot/dts/rockchip/rk3528-x88pro13.dtb
          retention-days: 7

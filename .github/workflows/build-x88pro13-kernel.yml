name: Build 6.18.y Kernel for X88 Pro 13

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v6
        with:
          repository: xyzphp/linux-6.18.y
          ref: x88pro13-dts
          path: kernel

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bc flex bison libssl-dev kmod cpio \
            gcc-aarch64-linux-gnu device-tree-compiler

      - name: Build kernel
        run: |
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          # Disable non-Rockchip clk drivers that fail with new clk-provider.h API
          for cfg in CONFIG_CLK_IMX8MP CONFIG_CLK_RENESAS CONFIG_CLK_VF610 \
                     CONFIG_CLK_SAMSUNG CONFIG_CLK_SOCFPGA CONFIG_CLK_SUNXI \
                     CONFIG_CLK_TI CONFIG_CLK_UNIPHIER CONFIG_COMMON_CLK_XGENE \
                     CONFIG_CLK_QORIQ CONFIG_CLK_LS1028A CONFIG_CLK_LPC32XX \
                     CONFIG_COMMON_CLK_PALMAS CONFIG_CLK_PISTACHIO \
                     CONFIG_COMMON_CLK_PWM CONFIG_CLK_QCOM \
                     CONFIG_COMMON_CLK_OXNAS CONFIG_COMMON_CLK_AT91 \
                     CONFIG_COMMON_CLK_AXI_CLKGEN CONFIG_CLK_HSDK; do
            scripts/config --file .config --disable $cfg 2>/dev/null || true
          done
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image modules dtbs
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- INSTALL_MOD_PATH=./modules modules_install

      - name: Package kernel
        run: |
          cd kernel
          mkdir -p output
          cp arch/arm64/boot/Image output/
          cp .config output/config-6.18.y
          cp arch/arm64/boot/dts/rockchip/rk3528-x88pro13.dtb output/
          tar czf output/modules.tar.gz -C modules lib/
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x88pro13-kernel-6.18
          path: kernel/output/*
          retention-days: 7

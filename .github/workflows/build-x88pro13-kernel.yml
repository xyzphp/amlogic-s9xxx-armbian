name: Build 6.18.y Kernel for X88 Pro 13

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v6
        with:
          repository: xyzphp/linux-6.18.y
          ref: x88pro13-dts
          path: kernel

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bc flex bison libssl-dev kmod cpio \
            gcc-aarch64-linux-gnu device-tree-compiler

      - name: Build kernel
        run: |
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image modules dtbs
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- INSTALL_MOD_PATH=./modules modules_install

      - name: Package kernel
        run: |
          cd kernel
          mkdir -p output
          cp arch/arm64/boot/Image output/
          cp arch/arm64/boot/dts/rockchip/rk3528-x88pro13.dtb output/
          tar czf output/modules.tar.gz -C modules lib/
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x88pro13-kernel-6.18
          path: kernel/output/*
          retention-days: 7

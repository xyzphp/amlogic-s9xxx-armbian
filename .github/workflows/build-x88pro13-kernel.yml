name: Build 6.18.y Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          repository: xyzphp/linux-6.18.y
          ref: x88pro13-dts
          path: kernel

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bc flex bison libssl-dev kmod cpio \
            gcc-aarch64-linux-gnu device-tree-compiler

      - name: Build
        run: |
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          # Disable all problematic clock drivers
          scripts/config --file .config \
            --disable CONFIG_ARCH_IMX \
            --disable CONFIG_ARCH_RENESAS \
            --disable CONFIG_ARCH_SUNXI \
            --disable CONFIG_ARCH_QCOM \
            --disable CONFIG_ARCH_EXYNOS \
            --disable CONFIG_ARCH_SOCFPGA \
            --disable CONFIG_ARCH_UNIPHIER \
            --disable CONFIG_ARCH_LPC18XX \
            --disable CONFIG_ARCH_LS1028A \
            --disable CONFIG_ARCH_KEEMBAY \
            --disable CONFIG_ARCH_STRATIX10 \
            --disable CONFIG_ARCH_TEGRA \
            --disable CONFIG_ARCH_PISTACHIO \
            --disable CONFIG_ARCH_SPLAYTRUM 2>/dev/null || true
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image modules dtbs 2>&1 | tail -20
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- INSTALL_MOD_PATH=./modules modules_install 2>&1 | tail -5

      - name: Package
        if: always()
        run: |
          cd kernel
          mkdir -p output
          cp arch/arm64/boot/Image output/ 2>/dev/null || echo "No Image"
          find arch/arm64/boot/dts/rockchip/ -name "*x88pro13*" -exec cp {} output/ \; 2>/dev/null || echo "No dtb"
          tar czf output/modules.tar.gz -C modules lib/ 2>/dev/null || echo "No modules"
          echo "=== output ===" && ls -la output/

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x88pro13-kernel-6.18
          path: kernel/output/*
          retention-days: 7
